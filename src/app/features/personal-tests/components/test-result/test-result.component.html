<div class="tr">
  <div class="tr__hero">
    <div class="tr__hero-bg" aria-hidden="true">
      <div class="tr__orb tr__orb--1"></div>
      <div class="tr__orb tr__orb--2"></div>
    </div>

    <div class="tr__hero-content">
      <div class="tr__badge">{{ result.type }}</div>
      <h1 class="tr__title">{{ result.title }}</h1>
      <p class="tr__subtitle">{{ result.subtitle }}</p>
    </div>
  </div>

  <div class="tr__sections">
    <div
      class="tr__section"
      *ngFor="let section of result.sections; let i = index"
      [style.animation-delay]="i * 0.1 + 's'"
    >
      <div class="tr__section-header">
        <span class="tr__section-num">{{
          (i + 1).toString().padStart(2, "0")
        }}</span>
        <h3 class="tr__section-title">{{ section.title }}</h3>
      </div>

      <p class="tr__section-desc">{{ section.sectionsDescription }}</p>

      <ul class="tr__section-list" *ngIf="section.sectionsList?.length">
        <li *ngFor="let item of section.sectionsList" class="tr__section-item">
          <span class="tr__section-bullet"></span>
          {{ item }}
        </li>
      </ul>
    </div>
  </div>

  <!-- Дії -->
  <div class="tr__actions">
    <button class="tr__btn tr__btn--primary" (click)="onShare.emit()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle
          cx="12"
          cy="3"
          r="1.5"
          stroke="currentColor"
          stroke-width="1.3"
        />
        <circle
          cx="12"
          cy="13"
          r="1.5"
          stroke="currentColor"
          stroke-width="1.3"
        />
        <circle
          cx="4"
          cy="8"
          r="1.5"
          stroke="currentColor"
          stroke-width="1.3"
        />
        <path
          d="M10.5 3.8L5.5 7.2M5.5 8.8l5 3.4"
          stroke="currentColor"
          stroke-width="1.3"
        />
      </svg>
      Поділитись
    </button>
    <button class="tr__btn tr__btn--ghost" (click)="onRestart.emit()">
      Пройти знову
    </button>
  </div>
</div>
